<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather Service</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
  </head>

  <body id="weather-app-da395b">
    <main class="container weather-container">
      <section class="weather-search">
        <h1>Weather Service</h1>
        <p>We'll fetch the weather for you! Where do you want to know the weather?</p>

        <div class="search-row">
          <button id="location-button" class="btn btn-primary">
            My location!
          </button>

          <input
            type="text"
            id="city-input"
            class="form-control"
            placeholder="Enter city here..."
            data-bs-toggle="popover"
            data-bs-placement="bottom"
            data-bs-content="We couldn't find the city, try again!"
          >
        </div>

        <div id="weather-result"></div>
      </section>

      <hr>

      <section class="latest-section">
        <h2>Latest requests</h2>
        <p>We remember your last five requests for you</p>

        <div id="latest-requests"></div>
      </section>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
